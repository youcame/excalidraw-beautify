# excalidraw.saycraft.ai — static Excalidraw + AI 美化 (DeepSeek) proxy.
#
# Target server: tencent-us (43.162.82.43), same box as saycraft.ai.
# Static build served directly from disk; /beautify-api/* reverse-proxied to the
# DeepSeek proxy container on 127.0.0.1:8787.
#
# Install: /etc/nginx/sites-available/excalidraw.saycraft.ai.conf
#   sudo ln -sf /etc/nginx/sites-available/excalidraw.saycraft.ai.conf \
#               /etc/nginx/sites-enabled/excalidraw.saycraft.ai.conf
# Cert: Let's Encrypt (certbot, webroot /var/www/acme).

server {
    listen 80;
    listen [::]:80;
    server_name excalidraw.saycraft.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
        allow all;
    }

    location / {
        return 301 https://excalidraw.saycraft.ai$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name excalidraw.saycraft.ai;

    ssl_certificate     /etc/letsencrypt/live/excalidraw.saycraft.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/excalidraw.saycraft.ai/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    add_header Strict-Transport-Security "max-age=31536000" always;

    access_log /var/log/nginx/excalidraw.saycraft.ai.access.log;
    error_log  /var/log/nginx/excalidraw.saycraft.ai.error.log;

    root /www/wwwroot/excalidraw/web;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/acme;
        allow all;
    }

    # AI 美化 proxy → DeepSeek (key lives only in the proxy container).
    # Trailing slash strips the /beautify-api prefix: /beautify-api/api/beautify
    # → http://127.0.0.1:8787/api/beautify
    location /beautify-api/ {
        proxy_pass http://127.0.0.1:8787/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        client_max_body_size 4m;
    }

    # Long-cache hashed assets.
    location ~* \.(?:js|css|woff2?|png|svg|json|wasm)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    # SPA fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
